version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: monitoring-tfg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: monitoring_tfg
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - monitoring_tfg_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: monitoring-tfg-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:latest
    container_name: monitoring-tfg-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  monitoring_tfg_postgres_data: